apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-compliance-auditor
  labels:
    app: auditor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auditor
  template:
    metadata:
      labels:
        app: auditor
    spec:
      containers:
      - name: auditor-agent
        image: global-compliance-auditor:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: auditor-secrets
